<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM-Craft Production Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0E1165;
  --navy-light: #1a1d7a;
  --navy-dark: #090d4a;
  --accent: #3B82F6;
  --accent-light: #60A5FA;
  --surface: #FFFFFF;
  --surface-alt: #F8F9FC;
  --surface-hover: #F1F3F9;
  --border: #E2E5F1;
  --border-light: #ECEEF5;
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-muted: #94A3B8;
  --success: #10B981;
  --success-bg: #ECFDF5;
  --warning: #F59E0B;
  --warning-bg: #FFFBEB;
  --danger: #EF4444;
  --danger-bg: #FEF2F2;
  --info-bg: #EFF6FF;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-sm: 0 1px 3px rgba(14,17,101,0.06);
  --shadow: 0 4px 16px rgba(14,17,101,0.08);
  --shadow-lg: 0 8px 32px rgba(14,17,101,0.12);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --topbar-h: 56px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--surface-alt);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.topbar {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  padding: 0 32px;
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(14,17,101,0.2);
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-logo { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: 1.5px; text-transform: uppercase; }
.topbar-logo span { color: var(--accent-light); font-weight: 400; }
.topbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.2); }
.topbar-title { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 500; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-clock { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.7); }
.topbar-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.6); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.btn-refresh { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px; font-family: inherit; font-weight: 500; cursor: pointer; transition: var(--transition); }
.btn-refresh:hover { background: rgba(255,255,255,0.2); }
.topbar-spacer { height: var(--topbar-h); }

.kpi-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
.kpi-item { flex: 1; background: var(--surface); padding: 14px 16px; text-align: center; }
.kpi-value { font-size: 24px; font-weight: 700; color: var(--navy); font-family: 'JetBrains Mono', monospace; line-height: 1; }
.kpi-value.danger { color: var(--danger); }
.kpi-value.warning { color: var(--warning); }
.kpi-value.success { color: var(--success); }
.kpi-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 4px; font-weight: 500; }

.main-content { padding: 20px 28px; }
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-box { flex: 1; max-width: 360px; position: relative; }
.search-box input { width: 100%; padding: 9px 14px 9px 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text-primary); transition: var(--transition); }
.search-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.search-box svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
.filter-chip { padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-family: inherit; font-weight: 500; color: var(--text-secondary); background: var(--surface); cursor: pointer; transition: var(--transition); white-space: nowrap; }
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.filter-count { font-size: 12px; color: var(--text-muted); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

.wo-table-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; max-height: calc(100vh - var(--topbar-h) - 160px); }
.wo-table { width: 100%; border-collapse: collapse; }
.wo-table thead th { padding: 11px 14px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); text-align: left; background: var(--surface-alt); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 10; white-space: nowrap; cursor: pointer; user-select: none; }
.wo-table thead th:hover { color: var(--navy); }
.wo-table thead th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
.wo-table thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
.wo-table tbody tr { cursor: pointer; transition: var(--transition); border-bottom: 1px solid var(--border-light); }
.wo-table tbody tr:hover { background: var(--surface-hover); }
.wo-table tbody td { padding: 12px 14px; font-size: 13px; vertical-align: middle; }
.wo-id { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--navy); font-size: 12px; white-space: nowrap; }
.customer-name { font-weight: 500; color: var(--text-primary); white-space: nowrap; }
.desc-text { color: var(--text-secondary); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 130px; }
.progress-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
.progress-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; min-width: 36px; text-align: right; }
.deadline-badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
.deadline-badge.overdue { background: var(--danger-bg); color: var(--danger); }
.deadline-badge.urgent { background: var(--warning-bg); color: #B45309; }
.deadline-badge.ok { background: var(--success-bg); color: #047857; }
.deadline-badge.neutral { background: var(--surface-alt); color: var(--text-secondary); }
.amount-cell { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 12px; text-align: right; white-space: nowrap; }
.date-cell { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.parts-cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; text-align: center; white-space: nowrap; }

/* DETAIL — Full screen */
.detail-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: var(--surface-alt); overflow-y: auto; }
.detail-overlay.active { display: block; }
.detail-header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); padding: 20px 32px; color: #fff; position: sticky; top: 0; z-index: 10; }
.detail-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.btn-back { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 7px 16px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; transition: var(--transition); }
.btn-back:hover { background: rgba(255,255,255,0.2); }
.detail-wo-id { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
.detail-customer { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.9); margin-top: 2px; }
.detail-meta { display: flex; gap: 24px; margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.7); flex-wrap: wrap; }
.detail-meta strong { color: #fff; font-weight: 600; }
.detail-body { padding: 24px 32px; max-width: 1400px; }
.detail-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
.detail-kpi { background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius-sm); padding: 14px 16px; text-align: center; box-shadow: var(--shadow-sm); }
.detail-kpi-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--navy); }
.detail-kpi-val.success { color: var(--success); }
.detail-kpi-val.danger { color: var(--danger); }
.detail-kpi-val.warning { color: var(--warning); }
.detail-kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
.parts-section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.parts-section-title .count { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--navy); color: #fff; padding: 2px 8px; border-radius: 10px; }
.parts-table-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; }
.parts-table { width: 100%; border-collapse: collapse; }
.parts-table thead th { padding: 10px 12px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); text-align: left; background: var(--surface-alt); border-bottom: 2px solid var(--border); white-space: nowrap; position: sticky; top: 0; }
.parts-table tbody tr { border-bottom: 1px solid var(--border-light); cursor: pointer; transition: var(--transition); }
.parts-table tbody tr:hover { background: var(--surface-hover); }
.parts-table tbody td { padding: 11px 12px; font-size: 12px; vertical-align: middle; }
.pn-code { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 11px; color: var(--navy); }
.stock-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
.stock-badge.in-stock { background: var(--success-bg); color: #047857; }
.stock-badge.no-stock { background: var(--danger-bg); color: var(--danger); }
.stock-badge.loading { background: var(--surface-alt); color: var(--text-muted); }

/* PART MODAL */
.part-modal-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(14,17,101,0.4); backdrop-filter: blur(4px); justify-content: center; align-items: center; }
.part-modal-overlay.active { display: flex; }
.part-modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: min(760px, 94vw); max-height: 88vh; overflow-y: auto; animation: scaleIn 0.2s cubic-bezier(0.4,0,0.2,1); }
@keyframes scaleIn { from{transform:scale(0.96);opacity:0} to{transform:scale(1);opacity:1} }
.part-modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
.part-modal-pn { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--navy); }
.part-modal-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.btn-close-modal { background: none; border: 1px solid var(--border); width: 32px; height: 32px; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 16px; transition: var(--transition); flex-shrink: 0; }
.btn-close-modal:hover { background: var(--surface-alt); color: var(--text-primary); }
.part-modal-body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.part-image-area { grid-column: 1 / -1; background: var(--surface-alt); border: 1px solid var(--border-light); border-radius: var(--radius-sm); min-height: 180px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.part-image-area img { max-width: 100%; max-height: 280px; object-fit: contain; }
.part-image-area .no-image { color: var(--text-muted); font-size: 13px; }
.part-info-group h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid var(--navy); }
.part-info-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border-light); font-size: 12px; gap: 12px; }
.part-info-row:last-child { border-bottom: none; }
.part-info-label { color: var(--text-secondary); flex-shrink: 0; }
.part-info-value { font-weight: 500; color: var(--text-primary); text-align: right; word-break: break-all; }
.part-info-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.part-link { color: var(--accent); text-decoration: none; font-weight: 500; font-size: 12px; }
.part-link:hover { text-decoration: underline; }

.loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; }
.loader { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loader-text { font-size: 13px; color: var(--text-muted); }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* --- REVENUE CALENDAR --- */
.cal-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px 14px;
}

.cal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.cal-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.cal-subtitle {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-muted);
  margin-left: 8px;
}

.cal-total {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
}

.cal-scroll-wrap {
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 6px;
  scrollbar-width: thin;
}

.cal-grid {
  display: flex;
  gap: 12px;
  min-width: max-content;
}

.cal-month {
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  overflow: hidden;
  flex-shrink: 0;
  width: calc((100vw - 80px) / 3);
  min-width: 300px;
  max-width: 450px;
}

.cal-month.current {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}

.cal-month-header {
  background: var(--navy);
  color: #fff;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cal-month.current .cal-month-header {
  background: var(--accent);
}

.cal-month-header .month-name { }

.cal-month-header .month-total {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 12px;
}

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--surface-alt);
  border-bottom: 1px solid var(--border-light);
}

.cal-weekday {
  padding: 6px 0;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border-light);
}

.cal-day {
  background: var(--surface);
  min-height: 56px;
  padding: 4px 6px;
  position: relative;
  cursor: default;
}

.cal-day.empty { background: var(--surface-alt); }

.cal-day.today { background: #EFF6FF; }

.cal-day.has-data { cursor: pointer; }
.cal-day.has-data:hover { background: var(--surface-hover); }

.cal-day-num {
  font-weight: 500;
  color: var(--text-muted);
  font-size: 11px;
  line-height: 1;
}

.cal-day.today .cal-day-num { color: var(--accent); font-weight: 700; }

.cal-day-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  margin-top: 4px;
  line-height: 1.2;
}

.cal-day-amount.future { color: var(--success); }
.cal-day-amount.past { color: var(--danger); }

.cal-day-wo-count {
  font-size: 8px;
  color: var(--text-muted);
  margin-top: 1px;
}

.cal-day-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  border-radius: 0 0 1px 1px;
}

.cal-day-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--navy-dark);
  color: #fff;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  white-space: nowrap;
  z-index: 50;
  box-shadow: var(--shadow-lg);
  pointer-events: auto;
}

.cal-day.has-data:hover .cal-day-tooltip { display: block; }
.cal-day-tooltip:hover { display: block; }

.cal-day-tooltip .tt-amount {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 14px;
  color: #6EE7B7;
}

.cal-day-tooltip .tt-wos {
  margin-top: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  max-width: 260px;
  white-space: normal;
  line-height: 1.5;
}

.tt-wo-link {
  color: var(--accent-light);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 10px;
}

.tt-wo-link:hover {
  text-decoration: underline;
  color: #fff;
}


  .topbar { padding: 0 16px; }
  .main-content { padding: 14px 16px; }
  .kpi-bar { flex-wrap: wrap; }
  .kpi-item { flex: 1 1 calc(33% - 1px); }
  .part-modal-body { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">AM-CRAFT <span>|</span></div>
    <div class="topbar-divider"></div>
    <div class="topbar-title">Production Dashboard</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-status"><div class="status-dot"></div><span>Live</span></div>
    <div class="topbar-clock" id="clock"></div>
    <button class="btn-refresh" onclick="loadWorkOrders()">↻ Refresh</button>
  </div>
</div>
<div class="topbar-spacer"></div>

<!-- Revenue Pipeline - 3 visible, scroll right for more -->
<div class="cal-section" id="calSection">
  <div class="cal-header">
    <div class="cal-title">Revenue Pipeline <span class="cal-subtitle">by Delivery Deadline</span></div>
    <div class="cal-total" id="calTotal"></div>
  </div>
  <div class="cal-scroll-wrap">
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<div class="kpi-bar">
  <div class="kpi-item"><div class="kpi-value" id="kpiTotal">—</div><div class="kpi-label">Open WOs</div></div>
  <div class="kpi-item"><div class="kpi-value danger" id="kpiOverdue">—</div><div class="kpi-label">Overdue</div></div>
  <div class="kpi-item"><div class="kpi-value warning" id="kpiUrgent">—</div><div class="kpi-label">Due ≤7 Days</div></div>
  <div class="kpi-item"><div class="kpi-value" id="kpiParts">—</div><div class="kpi-label">Total Parts</div></div>
  <div class="kpi-item"><div class="kpi-value danger" id="kpiScrapRate">—</div><div class="kpi-label">Avg Scrap Rate</div></div>
  <div class="kpi-item"><div class="kpi-value" id="kpiTotalValue">—</div><div class="kpi-label">Total Value</div></div>
</div>

<div class="main-content">
  <div class="filter-bar">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Search WO, customer, description…" oninput="filterTable()">
    </div>
    <button class="filter-chip active" data-filter="all" onclick="setFilter(this)">All</button>
    <button class="filter-chip" data-filter="overdue" onclick="setFilter(this)">Overdue</button>
    <button class="filter-chip" data-filter="urgent" onclick="setFilter(this)">≤7 Days</button>
    <button class="filter-chip" data-filter="on-track" onclick="setFilter(this)">On Track</button>
    <div class="filter-count" id="filterCount"></div>
  </div>
  <div id="mainTableArea">
    <div class="loader-wrap"><div class="loader"></div><div class="loader-text">Loading production data…</div></div>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-header">
    <div class="detail-header-top">
      <button class="btn-back" onclick="closeDetail()">← Back to Dashboard</button>
      <div class="deadline-badge neutral" id="detailDeadlineBadge"></div>
    </div>
    <div class="detail-wo-id" id="detailWoId"></div>
    <div class="detail-customer" id="detailCustomer"></div>
    <div class="detail-meta" id="detailMeta"></div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<div class="part-modal-overlay" id="partModalOverlay" onclick="if(event.target===this)closePartModal()">
  <div class="part-modal">
    <div class="part-modal-header">
      <div><div class="part-modal-pn" id="partModalPN"></div><div class="part-modal-desc" id="partModalDesc"></div></div>
      <button class="btn-close-modal" onclick="closePartModal()">✕</button>
    </div>
    <div class="part-modal-body" id="partModalBody"></div>
  </div>
</div>

<script>
var API_BASE = 'https://script.google.com/macros/s/AKfycbzErJwC-vAczZ4u8piJzdVgtCCeQlGy7IEfT5yPxoEAvqc4o0jWu3d4dRWaIj9vQy_f/exec';
var allWorkOrders = [];
var currentFilter = 'all';
var sortCol = 'daysUntilDeadline';
var sortAsc = true;

// JSONP
var _cbc = 0;
function apiCall(params) {
  return new Promise(function(resolve, reject) {
    var cb = '__dc' + (_cbc++);
    var t = setTimeout(function() { delete window[cb]; reject(new Error('Timeout')); }, 30000);
    window[cb] = function(d) { clearTimeout(t); delete window[cb]; resolve(d); };
    var qs = 'callback=' + cb;
    for (var k in params) qs += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    var s = document.createElement('script');
    s.src = API_BASE + '?' + qs;
    s.onerror = function() { clearTimeout(t); delete window[cb]; reject(new Error('Network error')); };
    document.body.appendChild(s);
    setTimeout(function() { s.remove(); }, 200);
  });
}

// Progress conversion: ALL numeric values are ratios (0.23 = 23%, 1 = 100%, 1.4 = 140%)
function toPercent(val) {
  if (val === '' || val === null || val === undefined) return null;
  if (typeof val === 'string') {
    var low = val.toLowerCase();
    if (low.indexOf('not started') !== -1) return 0;
    if (low.indexOf('complete') !== -1) return 100;
    var n = parseFloat(val);
    if (isNaN(n)) return null;
    val = n;
  }
  if (typeof val === 'number') {
    // ALL values are ratios: 0.23 -> 23%, 1.0 -> 100%, 1.717 -> 171.7%, 4 -> 400%
    return Math.round(val * 1000) / 10;
  }
  return null;
}

function progressLabel(val) {
  if (val === '' || val === null || val === undefined) return '—';
  if (typeof val === 'string') {
    var low = val.toLowerCase();
    if (low.indexOf('not started') !== -1) return 'Not Started';
    if (low.indexOf('complete') !== -1) return '100%';
  }
  var pct = toPercent(val);
  if (pct === null) return '—';
  return pct.toFixed(1) + '%';
}

function formatCurrency(val) {
  var n = parseFloat(val);
  if (isNaN(n) || n === 0) return '—';
  return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function formatDays(days) {
  if (days === '' || days === null || days === undefined || isNaN(parseFloat(days))) return '—';
  days = parseFloat(days);
  if (days < 0) return Math.abs(Math.round(days)) + 'd overdue';
  if (days === 0) return 'Today';
  return Math.round(days) + 'd';
}

function getDeadlineClass(days) {
  if (days === '' || days === null || days === undefined || isNaN(parseFloat(days))) return 'neutral';
  days = parseFloat(days);
  if (days < 0) return 'overdue';
  if (days <= 7) return 'urgent';
  return 'ok';
}

function pColor(pct) {
  if (pct === null || pct <= 0) return 'var(--border)';
  if (pct >= 80) return 'var(--success)';
  if (pct >= 40) return 'var(--accent)';
  return 'var(--warning)';
}

function escH(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function cssId(s) { return String(s||'').replace(/[^a-zA-Z0-9]/g,'_'); }

function convertDriveLink(url) {
  if (!url) return '';
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w600';
  m = url.match(/id=([a-zA-Z0-9_-]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w600';
  return url;
}

function progressBarHtml(pct, label) {
  var w = pct !== null ? Math.min(pct, 100) : 0;
  return '<div class="progress-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' +
    w + '%;background:' + pColor(pct) + '"></div></div><span class="progress-pct">' + (label || '—') + '</span></div>';
}

// ============ REVENUE CALENDAR ============
var calDateMap = {};

function renderCalendar() {
  var grid = document.getElementById('calGrid');
  var today = new Date();
  today.setHours(0,0,0,0);
  var currentYear = today.getFullYear();

  // Build date->revenue map
  calDateMap = {};
  allWorkOrders.forEach(function(wo) {
    if (!wo.deliveryDeadline || wo.deliveryDeadline === 'TBA' || wo.deliveryDeadline === '') return;
    var amt = parseFloat(wo.amount) || 0;
    if (amt <= 0) return;
    var key = wo.deliveryDeadline;
    if (!calDateMap[key]) calDateMap[key] = { amount: 0, wos: [] };
    calDateMap[key].amount += amt;
    calDateMap[key].wos.push({ wo: wo.wo, customer: wo.customer, amount: amt });
  });

  // Months: current month through December of current year
  var startMonth = today.getMonth(); // 0-based
  var months = [];
  for (var m = startMonth; m <= 11; m++) {
    months.push(new Date(currentYear, m, 1));
  }

  var totalPipeline = 0;
  var html = '';

  // Find global max revenue for bar scaling
  var globalMax = 0;
  for (var key in calDateMap) {
    if (calDateMap[key].amount > globalMax) globalMax = calDateMap[key].amount;
  }

  months.forEach(function(monthStart) {
    var year = monthStart.getFullYear();
    var month = monthStart.getMonth();
    var monthName = monthStart.toLocaleString('en-US', { month: 'short' });
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var firstDayOfWeek = (monthStart.getDay() + 6) % 7; // Monday=0
    var isCurrent = (month === today.getMonth() && year === today.getFullYear());

    // Month total
    var monthTotal = 0;
    for (var d = 1; d <= daysInMonth; d++) {
      var key = year + '-' + ('0'+(month+1)).slice(-2) + '-' + ('0'+d).slice(-2);
      if (calDateMap[key]) monthTotal += calDateMap[key].amount;
    }
    totalPipeline += monthTotal;

    html += '<div class="cal-month' + (isCurrent ? ' current' : '') + '">';
    html += '<div class="cal-month-header"><span class="month-name">' + monthName + ' ' + year + '</span>';
    html += '<span class="month-total">' + (monthTotal > 0 ? formatCurrencyShort(monthTotal) : '—') + '</span>';
    html += '</div>';

    // Weekday headers
    html += '<div class="cal-weekdays">';
    ['M','T','W','T','F','S','S'].forEach(function(d) {
      html += '<div class="cal-weekday">' + d + '</div>';
    });
    html += '</div>';

    html += '<div class="cal-days">';

    // Empty cells
    for (var e = 0; e < firstDayOfWeek; e++) {
      html += '<div class="cal-day empty"></div>';
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var key = year + '-' + ('0'+(month+1)).slice(-2) + '-' + ('0'+d).slice(-2);
      var dateObj = new Date(year, month, d);
      var isToday = dateObj.getTime() === today.getTime();
      var isPast = dateObj < today;
      var entry = calDateMap[key];
      var hasData = !!entry;

      // All days with data are clickable - single WO goes direct, multiple shows first WO
      var clickAttr = '';
      if (hasData) {
        clickAttr = ' onclick="calDayClick(event, \'' + key + '\')"';
      }

      html += '<div class="cal-day' + (isToday ? ' today' : '') + (hasData ? ' has-data' : '') + '"' + clickAttr + '>';
      html += '<div class="cal-day-num">' + d + '</div>';

      if (entry) {
        var barH = globalMax > 0 ? Math.max(3, Math.round(entry.amount / globalMax * 22)) : 3;
        var colorClass = isPast ? 'past' : 'future';
        var barColor = isPast ? 'var(--danger)' : 'var(--success)';

        html += '<div class="cal-day-amount ' + colorClass + '">' + formatCurrencyShort(entry.amount) + '</div>';
        if (entry.wos.length > 1) {
          html += '<div class="cal-day-wo-count">' + entry.wos.length + ' WOs</div>';
        }
        html += '<div class="cal-day-bar" style="height:' + barH + 'px;background:' + barColor + ';opacity:0.3"></div>';

        html += '<div class="cal-day-tooltip">';
        html += '<div class="tt-amount">' + formatCurrency(entry.amount) + '</div>';
        html += '<div class="tt-wos">';
        entry.wos.forEach(function(w) {
          html += '<span class="tt-wo-link" onclick="event.stopPropagation();openDetail(\'' + escH(w.wo) + '\')">' + escH(w.wo) + '</span> · ' + escH(w.customer) + ' · ' + formatCurrencyShort(w.amount) + '<br>';
        });
        html += '</div></div>';
      }

      html += '</div>';
    }

    // Fill remaining
    var totalCells = firstDayOfWeek + daysInMonth;
    var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (var e = 0; e < remaining; e++) {
      html += '<div class="cal-day empty"></div>';
    }

    html += '</div>'; // cal-days
    html += '</div>'; // cal-month
  });

  grid.innerHTML = html;
  document.getElementById('calTotal').textContent = 'Pipeline: ' + formatCurrencyShort(totalPipeline);

  // Auto-scroll to current month
  var currentEl = grid.querySelector('.cal-month.current');
  if (currentEl) {
    currentEl.scrollIntoView({ inline: 'start', behavior: 'smooth', block: 'nearest' });
  }
}

function formatCurrencyShort(val) {
  var n = parseFloat(val);
  if (isNaN(n) || n === 0) return '—';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k €';
  return n.toFixed(0) + ' €';
}

function calDayClick(event, dateKey) {
  var entry = calDateMap[dateKey];
  if (!entry || !entry.wos.length) return;
  if (entry.wos.length === 1) {
    // Single WO - go directly to detail
    openDetail(entry.wos[0].wo);
  } else {
    // Multiple WOs - let tooltip handle clicks (don't do anything on day click)
    // Tooltip has clickable WO links
  }
}

// ============ LOAD ============
function loadWorkOrders() {
  document.getElementById('mainTableArea').innerHTML = '<div class="loader-wrap"><div class="loader"></div><div class="loader-text">Loading…</div></div>';
  apiCall({ action: 'getWorkOrders' }).then(function(res) {
    if (!res.success) { document.getElementById('mainTableArea').innerHTML = '<div class="loader-wrap"><div class="loader-text" style="color:var(--danger)">Error: ' + escH(res.error) + '</div></div>'; return; }
    allWorkOrders = res.data || [];
    updateKPIs();
    renderCalendar();
    renderTable();
  }).catch(function(e) {
    document.getElementById('mainTableArea').innerHTML = '<div class="loader-wrap"><div class="loader-text" style="color:var(--danger)">' + escH(e.message) + '</div></div>';
  });
}

function updateKPIs() {
  var n = allWorkOrders.length, ov = 0, ur = 0, tp = 0, scrapSum = 0, scrapCount = 0, tv = 0;
  allWorkOrders.forEach(function(wo) {
    var d = parseFloat(wo.daysUntilDeadline);
    if (!isNaN(d) && d < 0) ov++;
    if (!isNaN(d) && d >= 0 && d <= 7) ur++;
    tp += parseInt(wo.qtyParts) || 0;
    var sr = toPercent(wo.scrapRate);
    if (sr !== null && sr > 0) { scrapSum += sr; scrapCount++; }
    var a = parseFloat(wo.amount);
    if (!isNaN(a)) tv += a;
  });
  document.getElementById('kpiTotal').textContent = n;
  document.getElementById('kpiOverdue').textContent = ov;
  document.getElementById('kpiUrgent').textContent = ur;
  document.getElementById('kpiParts').textContent = tp.toLocaleString();
  document.getElementById('kpiScrapRate').textContent = scrapCount > 0 ? (scrapSum / scrapCount).toFixed(1) + '%' : '0%';
  document.getElementById('kpiTotalValue').textContent = formatCurrency(tv);
}

function renderTable() {
  var data = getFilteredData();
  sortData(data);
  var h = '<div class="wo-table-wrap"><table class="wo-table"><thead><tr>';
  var cols = [
    {k:'wo',l:'Work Order'},{k:'customer',l:'Customer'},{k:'description',l:'Description'},
    {k:'printingProgressPct',l:'Print Progress'},{k:'productionProgress',l:'Production'},
    {k:'daysUntilDeadline',l:'Deadline'},{k:'deliveryDeadline',l:'Delivery'},
    {k:'printingProgress',l:'Parts'},{k:'amount',l:'Amount'}
  ];
  cols.forEach(function(c) {
    var s = sortCol===c.k;
    h += '<th class="'+(s?'sorted':'')+'" onclick="toggleSort(\''+c.k+'\')">'+c.l+'<span class="sort-icon">'+(s?(sortAsc?'▲':'▼'):'⇅')+'</span></th>';
  });
  h += '</tr></thead><tbody>';
  if (!data.length) h += '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">No work orders</td></tr>';

  data.forEach(function(wo) {
    var pp = toPercent(wo.printingProgressPct);
    var pr = toPercent(wo.productionProgress);
    h += '<tr onclick="openDetail(\''+escH(wo.wo)+'\')">';
    h += '<td><span class="wo-id">'+escH(wo.wo)+'</span></td>';
    h += '<td><span class="customer-name">'+escH(wo.customer)+'</span></td>';
    h += '<td><span class="desc-text" title="'+escH(wo.description)+'">'+escH(wo.description)+'</span></td>';
    h += '<td>'+progressBarHtml(pp, pp!==null?pp.toFixed(0)+'%':'—')+'</td>';
    h += '<td>'+progressBarHtml(pr, progressLabel(wo.productionProgress))+'</td>';
    h += '<td><span class="deadline-badge '+getDeadlineClass(wo.daysUntilDeadline)+'">'+formatDays(wo.daysUntilDeadline)+'</span></td>';
    h += '<td><span class="date-cell">'+escH(wo.deliveryDeadline||'—')+'</span></td>';
    h += '<td><span class="parts-cell">'+escH(wo.printingProgress||'—')+'</span></td>';
    h += '<td><span class="amount-cell">'+formatCurrency(wo.amount)+'</span></td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('mainTableArea').innerHTML = h;
  document.getElementById('filterCount').textContent = data.length + ' / ' + allWorkOrders.length;
}

// ============ DETAIL ============
function openDetail(woNum) {
  var ov = document.getElementById('detailOverlay');
  ov.classList.add('active');
  document.body.style.overflow = 'hidden';
  var wo = allWorkOrders.find(function(w){return w.wo===woNum;});
  document.getElementById('detailWoId').textContent = woNum;
  if (wo) {
    var b = document.getElementById('detailDeadlineBadge');
    b.className = 'deadline-badge '+getDeadlineClass(wo.daysUntilDeadline);
    b.textContent = formatDays(wo.daysUntilDeadline);
    document.getElementById('detailCustomer').textContent = wo.customer||'';
    document.getElementById('detailMeta').innerHTML =
      '<span><strong>Description:</strong> '+escH(wo.description)+'</span>'+
      '<span><strong>Delivery:</strong> '+escH(wo.deliveryDeadline||'—')+'</span>'+
      '<span><strong>Production DL:</strong> '+escH(wo.productionDeadline||'—')+'</span>'+
      '<span><strong>Amount:</strong> '+formatCurrency(wo.amount)+'</span>';
  }
  document.getElementById('detailBody').innerHTML = '<div class="loader-wrap"><div class="loader"></div><div class="loader-text">Loading parts…</div></div>';
  apiCall({action:'getWODetails',wo:woNum}).then(function(res){
    if(!res.success){document.getElementById('detailBody').innerHTML='<div class="loader-wrap"><div class="loader-text" style="color:var(--danger)">'+escH(res.error)+'</div></div>';return;}
    renderDetail(res.data, wo);
  }).catch(function(){
    document.getElementById('detailBody').innerHTML='<div class="loader-wrap"><div class="loader-text" style="color:var(--danger)">Failed to load</div></div>';
  });
}

function renderDetail(parts, wo) {
  var b = document.getElementById('detailBody');
  var h = '';
  if (wo) {
    var pp = toPercent(wo.printingProgressPct);
    var pr = toPercent(wo.productionProgress);
    var sr = toPercent(wo.scrapRate);
    h += '<div class="detail-kpis">';
    h += kpi(wo.qtyParts,'Total Parts','');
    h += kpi(wo.printingProgress||'—','Printed','');
    h += kpi(pp!==null?pp.toFixed(1)+'%':'—','Print %', pp>=80?'success':pp>=40?'':'warning');
    h += kpi(pr!==null?pr.toFixed(1)+'%':progressLabel(wo.productionProgress),'Production %', pr>=80?'success':'');
    h += kpi(wo.qcPassed||0,'QC Passed','success');
    h += kpi(wo.qcFailed||0,'QC Failed',(parseInt(wo.qcFailed)||0)>0?'danger':'');
    h += kpi(sr!==null?sr.toFixed(1)+'%':'0%','Scrap Rate',sr>5?'danger':'');
    h += '</div>';
  }
  h += '<div class="parts-section-title">Part Numbers <span class="count">'+parts.length+'</span></div>';
  h += '<div class="parts-table-wrap"><table class="parts-table"><thead><tr>';
  h += '<th>Part Number</th><th>Description</th><th>PO Qty</th><th>Launched</th><th>Printed</th><th>QC</th><th>Printing</th><th>Production</th><th>Stock</th>';
  h += '</tr></thead><tbody>';
  if (!parts.length) h += '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text-muted)">No parts</td></tr>';

  var pns = [];
  parts.forEach(function(p) {
    if (p.partNumber) pns.push(p.partNumber);
    var pp = toPercent(p.printingProgress);
    var pr = toPercent(p.productionProgress);
    h += '<tr onclick="openPartModal(\''+escH(p.partNumber)+'\',\''+escH(p.description)+'\')">';
    h += '<td><span class="pn-code">'+escH(p.partNumber)+'</span></td>';
    h += '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+escH(p.description)+'">'+escH(p.description)+'</td>';
    h += '<td style="text-align:center;font-family:\'JetBrains Mono\',monospace;font-size:11px">'+(p.poQty||'—')+'</td>';
    h += '<td style="text-align:center">'+(p.qtyLaunched||0)+'</td>';
    h += '<td style="text-align:center">'+(p.qtyPrinted||0)+'</td>';
    h += '<td style="text-align:center">'+(p.qcPassed||0)+((parseInt(p.qcFailed)||0)>0?' / <span style="color:var(--danger)">'+p.qcFailed+'</span>':'')+'</td>';
    h += '<td>'+progressBarHtml(pp, pp!==null?pp.toFixed(0)+'%':'—')+'</td>';
    h += '<td><span class="progress-pct">'+progressLabel(p.productionProgress)+'</span></td>';
    h += '<td><span class="stock-badge loading" id="stock-'+cssId(p.partNumber)+'">…</span></td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  b.innerHTML = h;

  if (pns.length) {
    apiCall({action:'getStockBatch',items:pns.join(',')}).then(function(res){
      if(!res.success||!res.data) return;
      for(var pn in res.data){
        var el = document.getElementById('stock-'+cssId(pn));
        if(!el) continue;
        var q = res.data[pn];
        if(q>0){el.className='stock-badge in-stock';el.textContent=q;}
        else if(q===0){el.className='stock-badge no-stock';el.textContent='0';}
        else{el.className='stock-badge no-stock';el.textContent='err';}
      }
    }).catch(function(){});
  }
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('active'); document.body.style.overflow=''; }

// ============ PART MODAL ============
function openPartModal(pn,desc){
  document.getElementById('partModalOverlay').classList.add('active');
  document.getElementById('partModalPN').textContent=pn;
  document.getElementById('partModalDesc').textContent=desc||'';
  document.getElementById('partModalBody').innerHTML='<div class="loader-wrap" style="grid-column:1/-1"><div class="loader"></div><div class="loader-text">Loading from AM-101…</div></div>';
  apiCall({action:'getPartInfo',pn:pn}).then(function(res){
    if(!res.success||!res.data){document.getElementById('partModalBody').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">Part not found in AM-101</div>';return;}
    renderPart(res.data);
  }).catch(function(){
    document.getElementById('partModalBody').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--danger)">Failed to load</div>';
  });
}

function renderPart(d) {
  var b = document.getElementById('partModalBody');
  var h = '<div class="part-image-area">';
  if(d.pictureLink){h+='<img src="'+escH(convertDriveLink(d.pictureLink))+'" alt="Part" onerror="this.outerHTML=\'<span class=no-image>Image not accessible</span>\'">';}
  else{h+='<span class="no-image">No image available</span>';}
  h+='</div>';
  h+='<div class="part-info-group"><h4>Manufacturing</h4>';
  h+=ir('Printing Time',d.printingTimeMin?d.printingTimeMin+' min':'—');
  h+=ir('Avg Print Time',d.avgPrintingTimeMin?d.avgPrintingTimeMin+' min':'—');
  h+=ir('Model Material',d.modelMatQty?d.modelMatQty+' cm³':'—');
  h+=ir('Support Material',d.supportMatQty?d.supportMatQty+' cm³':'—');
  h+=ir('Post-Processing',d.postProcessing||'—');
  h+=ir('Release Cert.',d.releaseCert||'—');
  h+='</div>';
  h+='<div class="part-info-group"><h4>Design & Files</h4>';
  h+=ir('Design Holder',d.designHolder||'—');
  h+=ir('Drawing Nr',d.drawingNumber||'—');
  h+=ir('Drawing Issue',d.drawingIssue||'—');
  h+=ir('CAD File',d.cadFileRef||'—');
  h+=ir('CAD Revision',d.cadFileRev||'—');
  h+=ir('Capability',d.capabilityChecklist||'—');
  if(d.printFileLinkF450) h+=lr('Print File F450',d.printFileLinkF450);
  if(d.printFileLinkF900) h+=lr('Print File F900',d.printFileLinkF900);
  h+='</div>';
  b.innerHTML=h;
}

function closePartModal(){document.getElementById('partModalOverlay').classList.remove('active');}

// ============ FILTER/SORT ============
function getFilteredData() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  return allWorkOrders.filter(function(wo) {
    if (currentFilter!=='all') {
      var d = parseFloat(wo.daysUntilDeadline);
      if (currentFilter==='overdue'&&(isNaN(d)||d>=0)) return false;
      if (currentFilter==='urgent'&&(isNaN(d)||d<0||d>7)) return false;
      if (currentFilter==='on-track'&&(isNaN(d)||d<0)) return false;
    }
    if (q && (wo.wo+' '+wo.customer+' '+wo.description).toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
}
function setFilter(el){document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active')});el.classList.add('active');currentFilter=el.getAttribute('data-filter');renderTable();}
function filterTable(){renderTable();}
function toggleSort(c){if(sortCol===c)sortAsc=!sortAsc;else{sortCol=c;sortAsc=true;}renderTable();}
function sortData(d){d.sort(function(a,b){var va=a[sortCol],vb=b[sortCol];var ae=(va===''||va===null||va===undefined),be=(vb===''||vb===null||vb===undefined);if(ae&&be)return 0;if(ae)return 1;if(be)return-1;var na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return sortAsc?na-nb:nb-na;va=String(va).toLowerCase();vb=String(vb).toLowerCase();return sortAsc?va.localeCompare(vb):vb.localeCompare(va);});}

// Helpers
function kpi(v,l,c){return '<div class="detail-kpi"><div class="detail-kpi-val '+(c||'')+'">'+escH(String(v))+'</div><div class="detail-kpi-label">'+l+'</div></div>';}
function ir(l,v){return '<div class="part-info-row"><span class="part-info-label">'+l+'</span><span class="part-info-value mono">'+escH(String(v))+'</span></div>';}
function lr(l,u){return '<div class="part-info-row"><span class="part-info-label">'+l+'</span><a class="part-link" href="'+escH(u)+'" target="_blank">Open →</a></div>';}

// Clock + auto-refresh
function uc(){var n=new Date();document.getElementById('clock').textContent=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)+':'+('0'+n.getSeconds()).slice(-2);}
setInterval(uc,1000);uc();
setInterval(loadWorkOrders,5*60*1000);
loadWorkOrders();
</script>
